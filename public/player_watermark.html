<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ODS — Screen 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .watermark {
            max-width: 80%;
            max-height: 80%;
            opacity: 0;
            transition: opacity 0.6s ease-in;
            user-select: none;
            -webkit-user-drag: none;
        }

        .watermark.visible {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <img class="watermark" src="/resources/watermark.png" alt="" draggable="false" />

    <script>
        // ============================================================
        // ODS PLAYER WATERMARK — Screen 1 Hold Page
        // Shows static branded watermark until content is available.
        // Auto-redirects to player_content_manager.html when ready.
        // ============================================================

        const INITIAL_POLL_DELAY = 10000;   // First check after 10s
        const MAX_POLL_DELAY = 60000;       // Max backoff: 60s
        const BACKOFF_FACTOR = 1.5;

        let pollDelay = INITIAL_POLL_DELAY;

        async function checkForContent() {
            try {
                const resp = await fetch('/api/player/content');
                const data = await resp.json();

                if (data.hasContent && data.playlist && data.playlist.assets && data.playlist.assets.length > 0) {
                    console.log('[Watermark] Content ready — transitioning to content manager');
                    // Pass screen=1 so content manager renders the correct zones
                    const screenParam = new URLSearchParams(window.location.search).get('screen');
                    const target = '/player_content_manager.html' + (screenParam ? '?screen=' + screenParam : '');
                    window.location.href = target;
                    return;
                }

                // Content not ready — reset backoff on successful response
                pollDelay = INITIAL_POLL_DELAY;
                console.log(`[Watermark] No content yet (bootMode: ${data.bootMode}) — checking again in ${pollDelay / 1000}s`);

            } catch (err) {
                // Server might be restarting — increase backoff
                pollDelay = Math.min(pollDelay * BACKOFF_FACTOR, MAX_POLL_DELAY);
                console.warn(`[Watermark] Fetch error: ${err.message} — retrying in ${Math.round(pollDelay / 1000)}s`);
            }

            setTimeout(checkForContent, pollDelay);
        }

        // NOTE: Screen 1 does NOT signal /api/loader-ready.
        // Only Screen 0 (player_status.html) should dismiss the boot overlay.
        // If Screen 1 signals first (which it will — it's a simple static page),
        // it causes premature overlay dismissal → white flash on Screen 0.

        // Block keyboard shortcuts except system shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.altKey && e.shiftKey && e.code === 'KeyO') {
                window.location.href = '/system_options.html';
                return;
            }
            if (e.ctrlKey && e.altKey && e.shiftKey && e.code === 'KeyI') {
                e.preventDefault();
                window.location.href = '/player_status.html';
                return;
            }
            e.preventDefault();
            e.stopPropagation();
        }, true);

        document.addEventListener('contextmenu', e => e.preventDefault());

        // Wait for boot completion before showing watermark
        // (syncs with Screen 0's overlay dismissal)
        async function waitForBoot() {
            try {
                const resp = await fetch('/api/boot-status');
                const data = await resp.json();
                if (data.complete) {
                    document.querySelector('.watermark').classList.add('visible');
                    console.log('[Watermark] Boot complete — revealing watermark');
                    // Start content polling after watermark is visible
                    setTimeout(checkForContent, INITIAL_POLL_DELAY);
                    return;
                }
            } catch (e) {
                // Server not ready — keep polling
            }
            setTimeout(waitForBoot, 500);
        }

        // Start polling for boot completion
        console.log('[Watermark] Waiting for boot completion before reveal...');
        waitForBoot();
    </script>
</body>

</html>
